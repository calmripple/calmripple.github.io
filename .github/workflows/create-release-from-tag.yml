name: Create Release From Tag

on:
  # 推送语义化版本标签时创建草稿 Release。
  push:
    tags:
      - 'v*' # Push events to matching @sugarat/theme*
permissions:
  # 创建 Release 需要仓库内容写权限。
  contents: write
jobs:
  create_release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        id: checkout_source
        uses: actions/checkout@v6.0.1 # v4

      - name: Create Release for Tag
        id: create_release_for_tag
        uses: ncipollo/release-action@v1.20.0
        with:
          generateReleaseNotes: true
          draft: true
          body: |
            > Please refer to [CHANGELOG.md](https://github.com/ripplejourney/ripplejourney.github.io/blob/master/packages/theme/CHANGELOG.md) for details.
