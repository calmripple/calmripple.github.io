name: Auto Create PR On Push
on:
  # 当非主分支有新提交时自动创建 PR。
  push:
    branches-ignore:
      - master
      - main
  # 允许在 Actions 页面手动触发。
  workflow_dispatch:
    inputs:
      manual_branch:
        description: Set branch
        required: true
        type: string

permissions:
  # 工作流默认 Token 权限；需要更高权限时在具体 job 内单独声明。
  contents: read
env:
  TARGET_BRANCH: ${{ vars.TARGET_BRANCH || github.event.repository.default_branch }} # 主分支名称
  REVIEWERS_CSV: ${{ vars.REVIEWERS || 'calmripple' }}
  IS_DEBUG: ${{ vars.IS_DEBUG || 'true' }}

concurrency:
  group: pages-deployment-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  evaluate_push_context:
    name: Evaluate Push Context
    # 统一计算分支与 WIP 判断，并作为输出提供给后续 job。
    runs-on: ubuntu-latest
    outputs:
      is_not_target_branch: ${{ steps.evaluate_conditions.outputs.is_not_target_branch }}
      is_not_contain_wip: ${{ steps.evaluate_conditions.outputs.is_not_contain_wip }}
      able_create_pr: ${{ steps.evaluate_conditions.outputs.is_not_target_branch && steps.evaluate_conditions.outputs.is_push }}
    steps:
      - name: show debug info
        id: show_debug_info
        if: ${{ env.IS_DEBUG == 'true' }}
        uses: hmarr/debug-action@v3

      - name: show github context
        id: show_github_context
        if: ${{ env.IS_DEBUG == 'true' }}
        run: |
          echo 'github.env.TARGET_BRANCH = ${{ github.env.TARGET_BRANCH }}'
          echo 'env.TARGET_BRANCH = ${{ env.TARGET_BRANCH }}'
          echo '${{ !contains(github.ref, env.TARGET_BRANCH)}} =${{github.ref}} ? ${{env.TARGET_BRANCH}}'
          echo '${{ !contains(github.ref, env.TARGET_BRANCH)}} =${{github.ref}} ? ${{env.TARGET_BRANCH}}'
        shell: bash

      - name: printenv
        id: print_env_vars
        if: ${{ env.IS_DEBUG == 'true' }}
        run: printenv

      - name: Check if it is the main branch
        id: evaluate_conditions
        run: |
          # 防止从受保护目标分支自身创建 PR。
          echo "is_not_target_branch=${{ github.ref_name != env.TARGET_BRANCH }}" >> $GITHUB_OUTPUT
          # 将 WIP 标记视为自动化停止信号。
          echo "is_not_contain_wip=${{ !contains(github.event.head_commit.message, 'wip') && !contains(github.event.head_commit.message, 'WIP') }}" >> $GITHUB_OUTPUT
          echo "${{ github.event.head_commit.committer.username}}"
        shell: bash

  open_or_update_pr:
    name: Open Or Update Pull Request
    # 将当前分支创建/更新为指向 TARGET_BRANCH 的 PR。
    runs-on: ubuntu-latest
    needs: evaluate_push_context
    if: ${{ needs.evaluate_push_context.outputs.is_not_target_branch}}
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pull-request-number: ${{ steps.create_pull_request.outputs.pull-request-number }}
      pull-request-operation: ${{ steps.create_pull_request.outputs.pull-request-operation }}
      pull-request-url: "${{ steps.create_pull_request.outputs.pull-request-url }}"
    steps:
      - name: Checkout repository
        id: checkout_source
        if: ${{ needs.evaluate_push_context.outputs.is_not_target_branch}}
        uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false

      - name: Git Configuration
        id: configure_git
        run: |
          git config --global core.quotePath false
          git config --global core.autocrlf false
          git config --global core.safecrlf true
          git config --global core.ignorecase false

      - name: Create Pull Request
        id: create_pull_request
        if: ${{ steps.checkout_source.outcome == 'success'}}
        uses: peter-evans/create-pull-request@v8.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-create-pr"
          title: "[auto PR]${{ github.ref_name }}"
          body: |
            This is an automated pull request created from a feature branch.
            Please review and merge if ready.
          branch: ${{ github.ref }}
          base: ${{env.TARGET_BRANCH}}
          delete-branch: false

  auto_merge_admin_pr:
    name: Auto Merge PR (Member or Doc-only)
    # 满足以下任一条件时，PR 在所有检查通过后自动合并：
    #   1. PR 作者是仓库成员（write/maintain/admin）
    #   2. PR 仅修改了文档文件（.md / zh-CN/ / docs/ / public/ 等）
    runs-on: ubuntu-latest
    needs: open_or_update_pr
    if: ${{ needs.open_or_update_pr.outputs.pull-request-number != '' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check if PR author is repo member
        id: check_member
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          ROLE=$(gh api /repos/${REPO}/collaborators/${ACTOR}/permission --jq '.role_name' 2>/dev/null || echo "none")
          echo "Actor: $ACTOR, Role: $ROLE"
          if [ "$ROLE" = "admin" ] || [ "$ROLE" = "maintain" ] || [ "$ROLE" = "write" ]; then
            echo "is_member=true" >> $GITHUB_OUTPUT
          else
            echo "is_member=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if PR only modifies doc files
        id: check_docs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ needs.open_or_update_pr.outputs.pull-request-number }}"
          REPO="${{ github.repository }}"

          # 获取 PR 所有变更文件列表
          CHANGED=$(gh api /repos/${REPO}/pulls/${PR_NUMBER}/files --paginate --jq '.[].filename')
          echo "Changed files:"
          echo "$CHANGED"

          # 文档文件匹配规则（仅以下路径视为文档）：
          #   - zh-CN/ 目录下的所有文件
          #   - docs/ 目录下的所有文件
          #   - 根目录的 .md / .txt 等文件（无子目录）
          NON_DOC=$(echo "$CHANGED" | grep -vE \
            '^(zh-CN/|docs/).*|^[^/]+\.(md|txt|rst|mdx)$' \
            || true)

          if [ -z "$NON_DOC" ]; then
            echo "is_doc_only=true" >> $GITHUB_OUTPUT
            echo "✓ All changed files are documentation."
          else
            echo "is_doc_only=false" >> $GITHUB_OUTPUT
            echo "✗ Non-doc files detected:"
            echo "$NON_DOC"
          fi

      - name: Enable auto-merge
        if: ${{ steps.check_member.outputs.is_member == 'true' || steps.check_docs.outputs.is_doc_only == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ needs.open_or_update_pr.outputs.pull-request-number }}"
          REPO="${{ github.repository }}"

          IS_MEMBER="${{ steps.check_member.outputs.is_member }}"
          IS_DOC_ONLY="${{ steps.check_docs.outputs.is_doc_only }}"

          if [ "$IS_MEMBER" = "true" ]; then
            echo "▶ 触发原因：PR 作者是仓库成员"
          fi
          if [ "$IS_DOC_ONLY" = "true" ]; then
            echo "▶ 触发原因：PR 仅修改了文档文件"
          fi

          echo "Enabling auto-merge for PR #${PR_NUMBER}..."
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --squash \
            --auto \
            --delete-branch=false
          echo "✓ Auto-merge enabled. PR will merge automatically when all checks pass."
