name: Preview Build Pull Request
on:
  # 非信任 PR 的构建工作流：仅负责编译预览并上传制品。
  pull_request:
    branches-ignore:
      - master
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      # 保留 closed 事件，以便 workflow_run 发布器执行清理逻辑。
      - closed

permissions:
  # 纯构建流程不需要写权限，也不依赖敏感 Secret。
  contents: read

env:
  PREVIEW_BASE_URL: ${{ vars.PREVIEW_BASE_URL || 'https://preview.dmsrs.org' }}

concurrency:
  group: preview-build-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build_preview_artifact:
    name: Build Preview Artifact
    # PR 关闭时跳过构建；关闭后的清理由 workflow_run 工作流处理。
    if: ${{ github.event.pull_request.state != 'closed' }}
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.compute_preview_url.outputs.PREVIEW_URL }}
    steps:
      - name: Checkout PR merge ref
        id: checkout_pr_merge
        uses: actions/checkout@v6.0.1
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false
          fetch-depth: 0

      - name: Determine base URL
        id: compute_preview_url
        run: |
          PREVIEW_URL="${{ github.repository }}/pr/${{ github.event.pull_request.number }}"
          PREVIEW_URL="${{ env.PREVIEW_BASE_URL }}/$PREVIEW_URL"
          RELATIVE_URL=/$(echo "$PREVIEW_URL" | cut -d/ -f4-)

          echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "RELATIVE_URL=$RELATIVE_URL" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Setup PNPM
        id: setup_pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 10

      - name: Setup Node.js
        id: setup_node
        uses: actions/setup-node@v6.1.0
        with:
          node-version: 21
          cache: pnpm

      - name: Build website
        id: build_site
        env:
          RELATIVE_URL: ${{ steps.compute_preview_url.outputs.RELATIVE_URL }}
          BASE_URL: ${{ steps.compute_preview_url.outputs.PREVIEW_URL }}
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Upload preview artifact
        id: upload_preview_artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-dist-pr-${{ github.event.pull_request.number }}
          path: .vitepress/dist
          if-no-files-found: error
          retention-days: 3
